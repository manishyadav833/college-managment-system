<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-[#020617] via-[#0f172a] to-black
             min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-[#111827]/90
            border border-yellow-400/30
            rounded-3xl shadow-2xl p-10">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">

        <div class="w-20 h-20 rounded-full
                    bg-yellow-400 flex items-center justify-center
                    text-black text-3xl font-bold shadow-lg">

            YDC

        </div>

    </div>

    <!-- TITLE -->

    <h1 class="text-4xl font-bold text-center
               text-yellow-400 mb-2">

        Admin Login

    </h1>

    <p class="text-center text-gray-400 mb-8">

        Secure College Dashboard Access

    </p>

    <!-- ERROR -->

    <div th:if="${param.error}"
         class="bg-red-500/20 border border-red-500
                text-red-300 text-sm rounded-lg p-3 mb-5">

        Invalid Username or Password

    </div>

    <!-- FORM -->

    <form action="/admin/login"
          method="post"
          class="space-y-5">

        <!-- USERNAME -->

        <input
                type="text"
                name="username"
                placeholder="Enter Username"

                class="w-full p-4 rounded-xl
                       bg-[#1e293b]
                       text-white
                       border border-gray-700
                       focus:border-yellow-400
                       focus:outline-none">

        <!-- PASSWORD -->

        <input
                type="password"
                name="password"
                placeholder="Enter Password"

                class="w-full p-4 rounded-xl
                       bg-[#1e293b]
                       text-white
                       border border-gray-700
                       focus:border-yellow-400
                       focus:outline-none">

        <!-- BUTTON -->

        <button
                class="w-full bg-yellow-400
                       hover:bg-yellow-500
                       text-black font-bold
                       py-4 rounded-xl
                       transition duration-300
                       shadow-lg">

            Login

        </button>

    </form>

</div>

</body>
</html>
