<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topper Data Converter</title>
</head>

<body style="background:#0f172a;color:white;padding:20px;font-family:Arial">

<h1>Topper Data Converter</h1>

<p>
  Paste Excel/Table data below
</p>

<textarea
        id="input"
        style="width:100%;height:300px;padding:12px;font-size:14px;"
        placeholder="Paste copied Excel data here..."></textarea>

<br><br>

<input
        type="text"
        id="session"
        value="2021-2022"
        placeholder="Session"
        style="padding:10px;width:220px;font-size:14px;">

<button
        onclick="convertData()"
        style="padding:10px 20px;cursor:pointer;font-size:14px;">

  Convert

</button>

<br><br>

<textarea
        id="output"
        style="width:100%;height:350px;padding:12px;font-size:14px;"
        placeholder="JSON Output..."></textarea>

<script>

  function convertData() {

      const input = document.getElementById("input").value.trim();

      const session = document.getElementById("session").value;

      const lines = input.split("\n");

      let result = [];

      // Skip heading row
      for(let i = 1; i < lines.length; i++) {

          let cols = lines[i]
              .trim()
              .split("\t");

          // Ignore broken rows
          if(cols.length < 6) continue;

          result.push({

              universityMeritNo: cols[0].trim(),

              candidateName: cols[1].trim(),

              fatherName: cols[2].trim(),

              courseName: cols[3].trim(),

              semester: cols[4].trim(),

              percentage: cols[5].trim(),

              session: session

          });

      }

      document.getElementById("output").value =
          JSON.stringify(result, null, 2);

  }

</script>

</body>
</html>
